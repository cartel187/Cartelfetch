name: Manual Playlist Fetcher

on:
  workflow_dispatch: # This enables the "Run workflow" button

jobs:
  fetch-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: allows saving the file to your repo
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Execute Fetcher
        run: php update.php

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          # Commit only if the playlist was actually updated
          git diff --quiet && git diff --staged --quiet || (git commit -m "Manual Update: $(date)" && git push)
