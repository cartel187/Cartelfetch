name: Manual Playlist Fetcher

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Run Fetcher Script
        run: php update.php

      - name: Commit Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          # Add both files
          git add playlist.m3u custom.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Playlists" && git push)
