name: Manual Playlist Fetcher

on:
  workflow_dispatch: # Manual Button

jobs:
  update-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the script to push changes
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Execute Powerful Fetcher
        run: php update.php

      - name: Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u custom.m3u
          # Only commit if files actually changed
          git diff --staged --quiet || (git commit -m "Updated playlists - $(date)" && git push)
